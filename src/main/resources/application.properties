spring.application.name=wtc

# MongoDB connection is provided via the MONGODB_URI environment variable.
# See .env.example for the expected format. Never commit real credentials.
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:wtc_db}

# JWT signing secret (override in every environment).
api.security.token.secret=${JWT_SECRET:change-me-in-env}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# S3 / MinIO configuration (provided via environment variables).
aws.access-key=${AWS_ACCESS_KEY:minioadmin}
aws.secret-key=${AWS_SECRET_KEY:minioadmin}
aws.s3.endpoint=${AWS_S3_ENDPOINT:http://localhost:9000}
aws.s3.bucket=${AWS_S3_BUCKET:wtc-attachments}