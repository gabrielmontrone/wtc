spring.application.name=wtc

# Load local secrets from a git-ignored ".env" (KEY=VALUE) when present, so
# `mvnw spring-boot:run` works without exporting variables by hand. It is optional:
# in deployment (e.g. Render) the real environment variables are injected and take
# precedence, and the file is simply absent.
spring.config.import=optional:file:.env[.properties]

# MongoDB connection is provided via the MONGODB_URI environment variable.
# See .env.example for the expected format. Never commit real credentials.
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:wtc_db}

# JWT signing secret (override in every environment).
api.security.token.secret=${JWT_SECRET:change-me-in-env}

# Google Sign-In: OAuth 2.0 "Web application" client ID used as the expected audience
# when verifying the ID token sent by the Android app. Get it from the Firebase/Google
# Cloud console after enabling Google as a sign-in provider. Leave blank to disable.
google.oauth.client-id=${GOOGLE_CLIENT_ID:}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Uploads de anexos vão direto ao backend (multipart). Limite de 10MB por arquivo.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB